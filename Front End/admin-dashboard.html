<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <p>Manage salon services below.</p>

  <button id="logoutBtn">Logout</button>
  <button id="toggleFormBtn">Add Service</button>

  <h2>Service Listings</h2>
  <table border="1" cellpadding="8" cellspacing="0" id="serviceTable">
    <thead>
      <tr>
        <th>Service Name</th>
        <th>Description</th>
        <th>Price (₹)</th>
      </tr>
    </thead>
    <tbody id="serviceList"></tbody>
  </table>

  <div id="formContainer" style="display:none; margin-top:20px;">
    <h2>Add New Service</h2>
    <form id="serviceForm">
      <label for="name">Service Name:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="description">Description:</label><br>
      <textarea id="description" name="description" rows="4" cols="40" required></textarea><br><br>

      <label for="price">Price (₹):</label><br>
      <input type="number" id="price" name="price" required><br><br>

      <button type="submit">Save Service</button>
    </form>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("You must be logged in as admin.");
        window.location.href = "login.html";
        return;
      }

      async function loadServices() {
        try {
          const response = await axios.get("http://localhost:3000/service/get-services", {
            headers: { Authorization: token }
          });
          const services = response.data.services;
          const listBody = document.getElementById("serviceList");
          listBody.innerHTML = "";
          if (!services || services.length === 0) {
            listBody.innerHTML = `<tr><td colspan="4">No services listed yet.</td></tr>`;
          } else {
            services.forEach(service => {
              listBody.innerHTML += `
                <tr>
                  <td>${service.name}</td>
                  <td>${service.description}</td>
                  <td>₹${service.price}</td>
                </tr>
              `;
            });
          }
        } catch (error) {
          alert("Failed to load services: " + (error.response?.data.message || error.message));
        }
      }

      document.getElementById("toggleFormBtn").addEventListener("click", () => {
        const formContainer = document.getElementById("formContainer");
        formContainer.style.display = formContainer.style.display === "none" ? "block" : "none";
      });

      document.getElementById("serviceForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const data = {
          name: e.target.name.value,
          description: e.target.description.value,
          price: e.target.price.value
        };
        try {
          const response = await axios.post("http://localhost:3000/service/add-service", data, {
            headers: { Authorization: token }
          });
          alert(response.data.message);
          e.target.reset();
          document.getElementById("formContainer").style.display = "none";
          loadServices();
        } catch (error) {
          alert("Failed to add service: " + (error.response?.data.message || error.message));
        }
      });

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "login.html";
      });

      loadServices();
    });
  </script>
</body>
</html>
