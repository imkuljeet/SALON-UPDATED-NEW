<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
  <h1>Admin Dashboard</h1>
  <p>Manage salon services below.</p>

  <button id="logoutBtn">Logout</button>
  <button id="toggleFormBtn">Add Service</button>
  <button id="toggleStaffFormBtn">Add Staff</button>

  <h2>Service Listings</h2>
  <table border="1" cellpadding="8" cellspacing="0" id="serviceTable">
    <thead>
      <tr>
        <th>Service Name</th>
        <th>Description</th>
        <th>Price (₹)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="serviceList"></tbody>
  </table>

  <div id="formContainer" style="display:none; margin-top:20px;">
    <h2>Add New Service</h2>
    <form id="serviceForm">
      <label for="name">Service Name:</label><br>
      <select id="name" name="name" required>
        <option value="">-- Select a Service --</option>
        <option value="Haircut">Haircut</option>
        <option value="Hair Coloring">Hair Coloring</option>
        <option value="Hair Spa">Hair Spa</option>
        <option value="Facial">Facial</option>
        <option value="Manicure">Manicure</option>
        <option value="Pedicure">Pedicure</option>
        <option value="Waxing">Waxing</option>
        <option value="Threading">Threading</option>
        <option value="Massage">Massage</option>
        <option value="Bridal Makeup">Bridal Makeup</option>
      </select>
      <br><br>
  
      <label for="description">Description:</label><br>
      <textarea id="description" name="description" rows="4" cols="40" required></textarea><br><br>
  
      <label for="price">Price (₹):</label><br>
      <input type="number" id="price" name="price" required><br><br>
  
      <button type="submit">Save Service</button>
    </form>
  </div>  

<div id="staffFormContainer" style="display:none; margin-top:20px;">
  <h2>Add New Staff Member</h2>
  <form id="staffForm">
    <label for="staffName">Full Name:</label><br>
    <input type="text" id="staffName" name="staffName" required><br><br>

    <label for="specialization">Specialization:</label><br>
    <select id="specialization" name="specialization" required>
      <option value="">-- Select Specialization --</option>
      <option value="Hair Stylist">Hair Stylist</option>
      <option value="Color Specialist">Color Specialist</option>
      <option value="Beautician">Beautician</option>
      <option value="Massage Therapist">Massage Therapist</option>
      <option value="Makeup Artist">Makeup Artist</option>
      <option value="Nail Technician">Nail Technician</option>
    </select><br><br>

    <label for="experience">Years of Experience:</label><br>
    <input type="number" id="experience" name="experience" required><br><br>

    <label for="bio">Profile/Bio:</label><br>
    <textarea id="bio" name="bio" rows="4" cols="40" required></textarea><br><br>

    <button type="submit">Save Staff Member</button>
  </form>
</div>

<script src="admin-dashboard.js"></script>
  
</body>
</html>
