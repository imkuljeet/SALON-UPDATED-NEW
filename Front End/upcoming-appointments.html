<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Appointments</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .appointment-card {
      border: 1px solid #ccc; border-radius: 8px;
      padding: 15px; margin: 10px 0;
      background-color: #f9f9f9;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
    }
    .btn {
      margin-top: 10px; padding: 6px 12px;
      border: none; border-radius: 4px; cursor: pointer;
    }
    .cancel-btn { background-color: #d9534f; color: white; }
    .cancel-btn:hover { background-color: #c9302c; }
    .reschedule-btn { background-color: #5bc0de; color: white; }
    .reschedule-btn:hover { background-color: #31b0d5; }
    .slot-select { margin-top: 10px; padding: 5px; }
  </style>
</head>
<body>
  <h1>My Appointments</h1>
  <button onclick="window.location.href='customer-dashboard.html'">Back to Dashboard</button>
  <div id="appointmentDetails"></div>

  <script>
    function formatTime(timeString) {
      if (!timeString) return "";
      const [hours, minutes] = timeString.split(":");
      let h = parseInt(hours, 10);
      const suffix = h >= 12 ? "PM" : "AM";
      h = ((h + 11) % 12) + 1;
      return `${h}:${minutes} ${suffix}`;
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("You must be logged in to view appointments.");
        window.location.href = "login.html";
        return;
      }

      async function loadAppointments() {
        try {
          const response = await axios.get("http://localhost:3000/appointment/my", {
            headers: { Authorization: token }
          });

          const appointments = response.data.appointments || [];
          const detailsDiv = document.getElementById("appointmentDetails");

          if (appointments.length === 0) {
            detailsDiv.innerHTML = "<p>No appointments found.</p>";
            return;
          }

          detailsDiv.innerHTML = "";
          appointments.forEach(appt => {
            const slot = appt.ServiceAvailability || {};
            const service = slot.Service || {};
            const staff = slot.Staff || {};

            const card = document.createElement("div");
            card.className = "appointment-card";
            card.innerHTML = `
              <h3>Appointment #${appt.id}</h3>
              <p><strong>Status:</strong> ${appt.status}</p>
              <p><strong>Service:</strong> ${service.name || "—"} (₹${service.price || "—"})</p>
              <p><strong>Staff:</strong> ${staff.name || "Assigned Staff"}</p>
              <p><strong>Day:</strong> ${slot.dayOfWeek || "—"}</p>
              <p><strong>Time:</strong> ${formatTime(slot.startTime)} - ${formatTime(slot.endTime)}</p>
              ${appt.status !== "cancelled" ? `
                <button class="btn cancel-btn" onclick="cancelAppointment(${appt.id})">Cancel</button>
                <button class="btn reschedule-btn" onclick="showReschedule(${appt.id}, ${slot.serviceId})">Reschedule</button>
                <div id="reschedule-${appt.id}" style="margin-top:10px;"></div>
              ` : ""}
            `;
            detailsDiv.appendChild(card);
          });
        } catch (error) {
          alert("Failed to load appointments: " + (error.response?.data.message || error.message));
        }
      }

      window.cancelAppointment = async function(id) {
        try {
          await axios.put(`http://localhost:3000/appointment/cancel/${id}`, {}, {
            headers: { Authorization: token }
          });
          alert("Appointment cancelled successfully.");
          loadAppointments();
        } catch (error) {
          alert("Failed to cancel appointment: " + (error.response?.data.message || error.message));
        }
      };

      window.showReschedule = async function(apptId, serviceId) {
        const token = localStorage.getItem("token");
        try {
          const response = await axios.get(`http://localhost:3000/service-availability/${serviceId}`, {
            headers: { Authorization: token }
          });
          const slots = response.data.availability || [];
          const container = document.getElementById(`reschedule-${apptId}`);

          if (slots.length === 0) {
            container.innerHTML = "<p>No available slots.</p>";
            return;
          }

          const select = document.createElement("select");
          select.className = "slot-select";
          slots.filter(s => !s.isBooked).forEach(s => {
            const option = document.createElement("option");
            option.value = s.id;
            option.textContent = `${s.dayOfWeek} ${s.startTime}-${s.endTime}`;
            select.appendChild(option);
          });

          const confirmBtn = document.createElement("button");
          confirmBtn.textContent = "Confirm Reschedule";
          confirmBtn.className = "btn reschedule-btn";
          confirmBtn.onclick = async () => {
            const chosen = select.value;
            if (!chosen) return;
            try {
              await axios.put(`http://localhost:3000/appointment/reschedule/${apptId}`, { newSlotId: chosen }, {
                headers: { Authorization: token }
              });
              alert("Appointment rescheduled successfully.");
              loadAppointments();
            } catch (error) {
              alert("Failed to reschedule: " + (error.response?.data.message || error.message));
            }
          };

          container.innerHTML = "";
          container.appendChild(select);
          container.appendChild(confirmBtn);
        } catch (error) {
          alert("Failed to fetch slots: " + (error.response?.data.message || error.message));
        }
      };

      loadAppointments();
    });
  </script>
</body>
</html>
