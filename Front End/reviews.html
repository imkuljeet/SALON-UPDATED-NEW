<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Review</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .tile-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
    }
    .tile {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      width: 250px;
      background-color: #f9f9f9;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }
    .tile:hover {
      transform: scale(1.05);
      background-color: #eef;
    }
    .tile-title {
      font-weight: bold;
      margin-bottom: 8px;
    }
    .reviewed {
      opacity: 0.6;
      cursor: not-allowed;
      background-color: #f2f2f2;
    }
    .reviewed:hover {
      transform: none;
      background-color: #f2f2f2;
    }
    .form-section {
      margin-top: 30px;
      max-width: 500px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 15px;
      background-color: #007BFF;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .reviews-section {
      margin-top: 40px;
    }
    .review-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #fafafa;
    }
    .review-header {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .stars {
      color: gold;
    }
  </style>
</head>
<body>
  <h1>Submit Your Review</h1>
  <p>Select an appointment to review:</p>

  <div class="tile-container" id="appointmentsList"></div>

  <!-- Review Form -->
  <div class="form-section" id="reviewSection" style="display:none;">
    <h2>Write Your Review</h2>
    <form id="reviewForm">
      <input type="hidden" id="appointmentId"/>
      <input type="hidden" id="staffId"/>
      <input type="hidden" id="serviceId"/>

      <label for="rating">Rating</label>
      <select id="rating" required>
        <option value="">Select</option>
        <option value="1">⭐</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
      </select>

      <label for="comment">Comments</label>
      <textarea id="comment" rows="4" placeholder="Write your feedback..."></textarea>

      <button type="submit">Submit Review</button>
    </form>
  </div>

  <!-- Reviews List -->
  <div class="reviews-section">
    <h2>My Reviews</h2>
    <div id="reviewsList"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      if (!token) {
        alert("Login required");
        window.location.href = "login.html";
        return;
      }

      let reviewedAppointments = [];

      // Load user's reviews first
      async function loadReviews() {
        try {
          const res = await axios.get("http://localhost:3000/reviews/my", {
            headers: { Authorization: token }
          });
          const reviews = res.data.reviews || [];
          reviewedAppointments = reviews.map(r => r.appointmentId);

          const list = document.getElementById("reviewsList");
          list.innerHTML = "";

          reviews.forEach(r => {
            const stars = "⭐".repeat(r.rating);
            const serviceName = r.Service ? r.Service.name : "Unknown Service";
            const staffName = r.Staff ? r.Staff.name : "Unknown Staff";

            const card = document.createElement("div");
            card.className = "review-card";
            card.innerHTML = `
              <div class="review-header">${serviceName} with ${staffName}</div>
              <div class="stars">${stars}</div>
              <div><em>${r.comment || "No comment"}</em></div>
              <div style="font-size:12px; color:#666;">Reviewed on ${new Date(r.createdAt).toLocaleDateString()}</div>
            `;
            list.appendChild(card);
          });
        } catch (err) {
          alert("Failed to load reviews: " + (err.response?.data.message || err.message));
        }
      }

      // Load appointments
      async function loadAppointments() {
        try {
          const res = await axios.get("http://localhost:3000/appointment/my", {
            headers: { Authorization: token }
          });
          const appointments = res.data.appointments || [];
          const list = document.getElementById("appointmentsList");
          list.innerHTML = "";

          const validAppointments = appointments.filter(appt =>
            appt.status !== "cancelled"
          );

          validAppointments.forEach(appt => {
            const slot = appt.ServiceAvailability;
            const alreadyReviewed = reviewedAppointments.includes(appt.id);

            const tile = document.createElement("div");
            tile.className = "tile" + (alreadyReviewed ? " reviewed" : "");
            tile.innerHTML = `
              <div class="tile-title">${slot.Service.name}</div>
              <div><strong>Staff:</strong> ${slot.Staff.name}</div>
              <div><strong>Day:</strong> ${slot.dayOfWeek}</div>
              <div><strong>Time:</strong> ${slot.startTime} - ${slot.endTime}</div>
              <div style="margin-top:10px; text-align:center; color:${alreadyReviewed ? "red" : "#007BFF"};">
                ${alreadyReviewed ? "Already Reviewed" : "Review this appointment"}
              </div>
            `;
            if (!alreadyReviewed) {
              tile.addEventListener("click", () => {
                document.getElementById("appointmentId").value = appt.id;
                document.getElementById("staffId").value = slot.Staff.id;
                document.getElementById("serviceId").value = slot.Service.id;
                document.getElementById("reviewSection").style.display = "block";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
              });
            }
            list.appendChild(tile);
          });
        } catch (err) {
          alert("Failed to load appointments: " + (err.response?.data.message || err.message));
        }
      }

      // Submit review
      document.getElementById("reviewForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const reviewData = {
          appointmentId: document.getElementById("appointmentId").value,
          staffId: document.getElementById("staffId").value,
          serviceId: document.getElementById("serviceId").value,
          rating: document.getElementById("rating").value,
          comment: document.getElementById("comment").value
        };
        try {
          await axios.post("http://localhost:3000/reviews/create", reviewData, {
            headers: { Authorization: token }
          });
          alert("✅ Review submitted successfully!");
          e.target.reset();
          document.getElementById("reviewSection").style.display = "none";
          await loadReviews();
          await loadAppointments();
        } catch (err) {
          alert("Error submitting review: " + (err.response?.data.message || err.message));
        }
      });

      // Initial load
      await loadReviews();
      await loadAppointments();
    });
  </script>
</body>
</html>
